apiVersion: apps/v1
kind: Deployment
metadata:
  name: canine-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: canine-backend
  template:
    metadata:
      labels:
        app: canine-backend
    spec:
      securityContext:
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
      containers:
        - name: api
          image: image-registry.openshift-image-registry.svc:5000/your-project/canine-backend:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: canine-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: canine-secrets
                  key: jwt-secret
            - name: MISTRAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: canine-secrets
                  key: mistral-api-key
                  optional: true
            - name: CORS_ORIGINS
              value: "https://your-frontend-route.example.com"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: canine-backend
spec:
  selector:
    app: canine-backend
  ports:
    - port: 8000
      targetPort: 8000
